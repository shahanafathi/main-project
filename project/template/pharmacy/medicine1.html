<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sign Up Form by Colorlib</title>

    <!-- Font Icon -->
    <link rel="stylesheet" href="{% static 'fonts/material-icon/css/material-design-iconic-font.min.css' %}">

    <!-- Main css -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="main">
        <div class="container">
            <div class="signup-content">
                <div class="signup-img">
                    <img src="images/signup-img.jpg" alt="">
                </div>
                <div class="signup-form">
                    <form  action="{% url 'add_medicine' %}" method="POST" class="register-form" id="register-form">
                        <h2>student registration form</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Medicine Name</label>
                                <input type="text" name="medicineName" id="name"  required/>
                            </div>
                            <div class="form-group">
                                <label for="father_name">Strength :</label>
                                <input type="text" name="Strength" id="father_name"  pattern="^\d+\s?[a-zA-Z]+\/[a-zA-Z]+$" required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Description :</label>
                            <input type="text" name="Description" id="address" required/>
                        </div>
                       
                        <div class="form-row">
                            <div class="form-group">
                                <label for="state">Catogary :</label>
                                <div class="form-select">
                                    <select name="state" id="state">
                                        {% for i in datas %}
                                            <option value="{{ i.id }}">{{ i.category_name }}</option>
                                        {% endfor %}
                    
                                    </select>
                                    
                                </div>
                            </div>
                            
                        </div>
                        <div class="form-group">
                            <label for="price">price:</label>
                            <input type="number" name="price" id="price"pattern="^[0-9]{10}\.[0-9]{2}$">
                        </div>
                        <div class="form-group">
                            <label for="Price per Unit">Price per Unit :</label>
                            <input type="number" name="Price per Unit" id="pincode" pattern="^[0-9]+/perunit$">
                        </div>
                        <div class="form-group">
                            <label for="course">Quantity</label>
                            <input type="number" name="Quantity" id="pincode">
                        </div>
                        <div class="form-group">
                            <label for="Manufacturer">Manufacturer :</label>
                            <input type="text" name="Manufacturer" id="Manufacturer"  value="{{var1.first_name}}" readonly />
                        </div>
                        <div class="form-group">
                            <label for="expiryDate">Expiry Date</label>
                            <input type="date" id="expiryDate" name="expiryDate" required>
                
                        </div>
                        <div class="form-group">
                            <label for="Manufacturer">Manufacturer :</label>
                            <input type="text" name="Manufacturer" id="Manufacturer"  value="{{var1.first_name}}" readonly />
                        </div>
             <div class="form-submit">         
            <label for="Image"><b>Image</b></label><br>
            <input type="file" name="Image" accept="">
             </div>

            <div class="form-submit"> 
            <label for="Image"><b>Image</b></label><br>
            <input type="file" name="Image1" accept="">
            </div>
            <div class="form-submit">
            <label for="Image"><b>Image</b></label><br>
            <input type="file" name="Image2" accept="">
            </div>
            <div class="form-submit">
            <label for="Image"><b>Image</b></label><br>
            <input type="file" name="Image3" accept="">
            </div>
            <div class="form-submit">
                            <input type="submit" value="Reset All" class="submit" name="reset" id="reset" />
                            <input type="submit" value="Submit Form" class="submit" name="submit" id="submit" />
            </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body><!-- This templates was made by Colorlib (https://colorlib.com) -->
</html>
