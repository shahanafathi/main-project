<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <!-- Add any required CSS here -->
</head>
<body>
    <h1>My Cart</h1>
    
    {% if cart_items %}
        <table>
            <thead>
                <tr>
                    <th>Medicine Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for items in datas %}
                    <tr>
                        <td>{{ items.name }}</td>
                        <td>{{ items.quantity }}</td> <!-- Assuming you have a quantity field -->
                        <td>{{ items.price }}</td> <!-- Assuming the Medicine model has a price field -->
                        <td>
                            <form method="POST" action="{% url 'add_to_cart' items.id %}">
                                {% csrf_token %}
                                <!-- <button type="submit">Remove</button> -->
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>Your cart is empty.</p>
    {% endif %}
</body>
</html>
