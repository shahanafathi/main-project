<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <!-- Add any required CSS here -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 20px 0;
        }
        
        /* Table Styles */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        
        thead {
            background-color: #98c2ef;
            color: white;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: center;
        }
        
        th {
            font-size: 1.2em;
        }
        
        tr {
            border-bottom: 1px solid #ddd;
        }
        
        tr:hover {
            background-color: #98c2ef;
        }
        
        input[type="number"] {
            width: 50px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        /* Button Styles */
        button {
            padding: 8px 16px;
            background-color: #0e1a27;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #0f0f0f;
        }
        
        .remove-link {
            background-color: #110b0b;
        }
        
        .remove-link:hover {
            background-color: #150606;
        }
        
        /* Message Styles */
        p {
            text-align: center;
            font-size: 1.2em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>My Cart</h1>
    
    {% if cart_items %}
        <table>
            <thead>
                <tr>
                    
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>

            </thead>
                
                    
                        {% for items in cart_items %}
                        <tr>
                        <td>{{ items.medicine_id.name }}</td>
                        <td>
                            <input type="number" placeholder="" name="quatity" min="1" max="{{ items.medicine_id.quantity }}"  value="{{ items.medicine_id.quantity }}"><br>
                        
                        </td> 
                        
                        <td>{{ items.medicine_id.price }}</td> 
                        <td>
                            
                            <a href="{% url 'remove_cart' id=items.id %}"><button type="submit">remove</button></a>
                            
                        </td>
                        <br>
                    </tr>
                        {% endfor %}
                         <br>
                    
                    <br>
                    
        </table>
        
        <form action="{% url 'order_item' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="remove-link">Place Order</button>
        </form>
 {% else %}
  {% endif %}  
  
  <div>
      <p>{{ message }}</p>
  </div>

 


</body>
</html>
