     <style>
      body {
          font-family: Arial, sans-serif;
          background-color: #f1f9fc;
          margin: 0;
          padding: 0;
          color: #333;
          width:100%;
      }

      .container-fluid {
          background-color: #153c3e;
          width: 100%;
          height: 50px;
          display: flex;
          justify-content: flex-end;
          align-items: center;
          padding: 0 10px;
      }

      .navbar ul {
          display: flex;
          list-style: none;
          padding: 0;
          margin: 0;
      }

      .navbar li {
          margin-right:30px;
      }

      .navbar a {
          text-decoration: none;
          color: rgb(255, 255, 255);
          font-weight: bold;
          display: flex;
          align-items: center;
      }

      .navbar a svg {
          margin-left: 10px;
      }

      h1 {
          color: #1e362a;
          margin-top: 20px;
          margin-bottom: 20px;
          text-align: center;
          align-items: center;
        
      }

      p {
          color: #1e362a;
          font-size: large;
          font-weight: bold;
          margin-top: 20px;
          margin-bottom: 20px;
          text-align: center;
      }

      input[type="search"] {
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 5px;
          width: 900px;
          height: 50px;
          margin: 30px 0;
          display: block;
          margin-left: auto;
          margin-right: auto;
          box-sizing: border-box;
      }

      input[type="submit"] {
          width: 100px;
          height: 50px;
          border-radius: 20px;
          background-color: #ffffff;
          display: block;
          margin: 20px auto;
          text-align: center;
          cursor: pointer;
      }

      .search {
          background-color: hsla(177, 96%, 9%, 0.582);
          height: 100px;
          display: flex;
          justify-content: center;
          align-items: center;
      }

      .medicine-list {
          width: 80%;
          margin: 0 auto;
      }

      .medicine {
          background-color: #ffffff;
          padding: 20px;
          margin: 20px 0;

          border-radius: 8px;
      }

      .medicine h3 {
          margin: 0 0 10px 0;
          color: #153c3e;
      }

      .medicine p {
          margin: 0px 0;
      }

      .medicine button {
          background-color: #383838;
          color: white;
          border: none;
          padding: 10px 20px;
          cursor: pointer;
          border-radius: 5px;
          font-size: 16px;
      }

      .medicine button:hover {
          background-color: #000000;
      }
  </style> 
</head>
<body>

            <p>{{ medicine.description }}</p>
